name: Build and Push Docker Image

on:
  push:
    branches:
      - main  # mainブランチにコードがプッシュされると自動で起動します

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. リポジトリのコードを読み込む
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. ビルド用の拡張ツールをセットアップ
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hubに安全にログインする
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. イメージのビルドとアップロード（強力なキャッシュ機能付き）
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/qwen-comfyui:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/qwen-comfyui:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/qwen-comfyui:buildcache,mode=max
